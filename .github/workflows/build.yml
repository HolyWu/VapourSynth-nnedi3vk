name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-non-windows-wheel:
    strategy:
      matrix:
        include:
        - arch: linux_x86_64
          runs-on: ubuntu-latest
        - arch: linux_aarch64
          runs-on: ubuntu-24.04-arm
        - arch: macosx_x86_64
          runs-on: macos-26-intel
        - arch: macosx_arm64
          runs-on: macos-26
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v7

    - uses: pypa/cibuildwheel@v4.1.0
      env:
        CIBW_BUILD: cp314-*
        CIBW_BUILD_FRONTEND: uv
        CIBW_BEFORE_ALL_LINUX: >
          if command -v dnf >/dev/null 2>&1; then
            dnf -y install glslc
          else
            apk add --no-cache shaderc
          fi
        CIBW_BEFORE_ALL_MACOS: >
          brew install shaderc
        CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_34
        CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_34
      with:
        output-dir: dist
        extras: uv

    - name: Fix tag
      run: |
        pipx run wheel tags --remove --python-tag py3 --abi-tag none dist/*.whl

    - uses: actions/upload-artifact@v7
      with:
        name: nnedi3vk-${{ matrix.arch }}
        path: dist

  build-windows-wheel:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v7

    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        pacboy: >-
          git:p
          ninja:p
          python-wheel:p
          shaderc:p
          toolchain:p
          uv:p

    - name: Build
      run: |
        uv build -Csetup-args="-Dcpp_link_args=-static"

    - name: Fix tag and strip dll
      run: |
        cd dist
        wheel tags --remove --python-tag py3 --abi-tag none *.whl
        wheel unpack --dest unpacked *.whl
        rm *.whl
        strip $(find . -name '*.dll')
        wheel pack unpacked/*

    - uses: actions/upload-artifact@v7
      with:
        name: nnedi3vk-sdist
        path: dist/*.tar.gz

    - uses: actions/upload-artifact@v7
      with:
        name: nnedi3vk-win_amd64
        path: dist/*.whl

  publish:
    permissions:
      id-token: write
    needs: [build-non-windows-wheel, build-windows-wheel]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
